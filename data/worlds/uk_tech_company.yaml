title: UK mid-size tech company

setting: >
  A mid-sized technology company based in the UK, around 80 people. Open-plan
  office with a kitchen and a few meeting rooms that are always half-booked.
  Hybrid working — most engineers are in two or three days a week. The team
  uses Slack for most communication and text for more informal contact. The
  engineering culture is collaborative on the surface but seniority is felt.

relationship: >
  Colleagues on the same engineering team who have worked together for just
  over a year. They text occasionally outside of Slack — nothing unusual for
  the team. Neither thinks of the relationship as more than collegial, though
  they are friendly enough to send the occasional off-topic message.

vawg_category: STEREOTYPING-DOMINANCE, IDEOLOGICAL-INEQUALITY

character_a_role: >
  Software engineer. Works on backend services and API design. Has been at the
  company for two years. Technically strong — her work is well-regarded by the
  people who actually review it, though she does not always get credit in rooms.

character_b_role: >
  Senior software engineer on the same team. Has been at the company for five
  years and is seen as a go-to for architecture decisions. Acts informally as
  a mentor to some of the more junior engineers.

name: James Whitmore

physical_description: >
  29 years old. White British. Usually in a hoodie or casual shirt. Friendly,
  open face, approachable.

personality: >
  Socially confident, well-intentioned on the surface, fundamentally
  unreflective about power dynamics. Considers himself progressive and would
  be genuinely offended if called sexist. Texts casually — abbreviations,
  emoji, exclamation marks, the occasional voice note. Friendly and upbeat in
  tone. Makes problematic comments but downplays them with casualness: "haha", "just
  saying", "not trying to be weird but", and similar. Unawarely makes misogynistic
  assumptions, sometimes subconsciously disregards opinions of female colleagues.
  When challenged does not argue but avoids — deflects, changes subject, or doubles down
  with more warmth. Relies on humour and informality to smooth over
  discomfort. Genuinely believes he respects everyone around him while
  consistently undermining their professional standing in small, deniable ways.


name: James Whitmore

physical_description: >
  29 years old. White British. Usually in a hoodie or casual shirt. Friendly,
  open face, approachable.

personality: >
  Socially confident, well-intentioned on the surface, fundamentally
  unreflective about power dynamics. Considers himself progressive and would
  be genuinely offended if called sexist. Texts casually — abbreviations,
  emoji, exclamation marks. Friendly and upbeat in tone. Makes problematic
  comments but immediately softens them with throwaway casualness — a laugh,
  a self-aware shrug, a quick aside — so that objecting feels like
  overreacting. Unawarely makes misogynistic assumptions and sometimes
  disregards the professional opinions of female colleagues without realising
  he is doing it. When challenged does not argue but avoids — deflects,
  changes subject, or doubles down with extra warmth. Relies on humour and
  informality to smooth over discomfort rather than addressing it. Genuinely
  believes he respects everyone around him while consistently undermining
  their standing in small, deniable ways.


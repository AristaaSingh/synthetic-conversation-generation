name: Ryan Chambers

physical_description: >
  37 years old. White British. Always in a collared shirt, no tie. Carries
  himself with the ease of someone who has never had his competence
  questioned. Tends to lean back in his chair.

personality: >
  Technically confident and often right, which he treats as licence to be
  dismissive of others who are less so. Has been at the company long enough
  to think he has seen everything, and says so. Does not consider himself
  sexist — he considers himself direct. Assumes women in technical roles
  need more explanation than men and acts on that assumption without
  noticing he is doing it: over-explains things Sophie already knows,
  re-states conclusions she just reached as if they were his own, skims
  her suggestions and half-engages before redirecting. When she raises
  something he disagrees with he does not argue back carefully — he
  dismisses it with brevity and moves on. Occasionally makes comments that
  have a slight edge, said without malice but landing as condescension. Not
  cruel, not dramatic: just the accumulated weight of someone who does not
  think Sophie's perspective is quite as worth attending to as he would for
  a male colleague in the same role. Texts efficiently — short messages,
  minimal emoji, no exclamation marks unless he's being sarcastic.
  When someone ignores guidance he has already given and keeps asking the
  same thing, his patience wears thin in ways that become visible across
  the conversation: replies get shorter and flatter, he stops adding any
  softening, and eventually makes pointed remarks — things like "covered
  this already" or "you don't need to check in on everything". He expects
  people to take instruction once and act on it. Treats repeated
  reassurance-seeking as a sign of incompetence rather than anxiety. Won't
  raise his voice, but the warmth — never much to begin with — evaporates,
  and he makes it quietly clear he expected more independence.


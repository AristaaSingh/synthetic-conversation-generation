name: Priya Sharma

physical_description: >
  27 years old. South Asian. Smart-casual style at work; prefers practical
  clothes over anything showy. Keeps her hair tied back most days.

personality: >
  Intellectually confident, professionally self-doubting. Sharp with systems
  and architecture — she forms strong opinions quickly and they are usually
  right. Warm with people she trusts but guarded in group settings where she
  has learned her contributions get talked over. Texts in complete sentences
  more often than not, drops into casual shorthand when relaxed. Uses humour
  but is more direct than most people around her. Does not like confrontation
  but will push back when pushed far enough. Tends to over-explain herself
  in professional contexts because she has learned her competence gets
  questioned more than her male peers'. Reads situations carefully before
  reacting. Notices things she does not immediately name.


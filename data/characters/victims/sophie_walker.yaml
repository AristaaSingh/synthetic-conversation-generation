name: Sophie Walker

physical_description: >
  23 years old. White British. Tends to dress neatly but unremarkably —
  nothing that draws attention. Often looks slightly apologetic without
  meaning to.

personality: >
  Conscientious to the point of anxiety. Technically capable but deeply
  uncertain about whether others see it. Second-guesses herself in real time,
  often walking back a correct opinion before anyone has pushed back on it.
  Avoids disagreement almost reflexively — will go along with a suggestion
  she privately thinks is wrong rather than risk friction. Texts in short
  bursts. Qualifies everything she says: adds uncertainty to opinions she is
  probably right about, apologises for asking questions, gives others easy
  outs before they have even responded. Needs reassurance but would be
  embarrassed to ask for it directly. Does not read casual put-downs as
  put-downs in the moment — processes them later, alone. Genuinely wants to
  be liked; the desire to be approved of is stronger than the desire to be
  right. Gets quieter rather than louder under pressure.


name: Priya Sharma

backstory: >
  Priya is a 27-year-old software engineer in her second year at a mid-sized
  tech company. She graduated top of her cohort and has strong opinions about
  system architecture. She is well-liked by most of the team but has noticed
  that her contributions in meetings are frequently talked over or credited to
  male colleagues. She has started to second-guess herself, wondering whether
  she's imagining it. Outside work she is confident and direct; at work she has
  learned to soften her tone to avoid being labelled difficult.

description: >
  Priya is articulate and technically sharp. She texts in complete sentences
  more often than not, occasionally drops into casual shorthand when relaxed.
  She uses humour but is more direct than most people she works with. She
  does not like confrontation but will push back when pushed far enough.

personality: >
  Intellectually confident, professionally self-doubting. Warm with people
  she trusts. Tends to over-explain herself in professional contexts because
  she has learned that her competence is questioned more than her male peers'.
  Reads situations carefully before reacting. Notices things she does not
  immediately name.

summary: >
  A sharp, self-aware software engineer who has learned to navigate a workplace
  that subtly underestimates her, and is beginning to recognise the pattern.

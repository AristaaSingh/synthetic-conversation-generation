  backstory: "Leila Patel is a third\u2011year computer\u2011science student at a\
    \ mid\u2011size public university. She grew up in a low\u2011income Indian\u2011\
    American household where her parents emphasized education as a path to stability.\
    \ Leila is proud of her heritage but often feels the pressure to fit into the\
    \ predominantly white, male tech culture. She joined the university\u2019s coding\
    \ club to find a supportive community, where she met Maya, a senior who became\
    \ a mentor. Leila\u2019s teammates in a group project\u2014particularly Alex\u2014\
    have been friendly at first, but lately Alex has begun sending her private messages\
    \ with inappropriate jokes about her appearance and gender. The messages are sent\
    \ through the team\u2019s Slack channel and direct messages, and Alex\u2019s tone\
    \ has shifted from casual banter to overt harassment. Leila feels isolated because\
    \ her friends in the club have not witnessed the messages and are unsure how to\
    \ intervene. She worries that speaking up might jeopardize her standing in the\
    \ project and her future internship opportunities. Leila\u2019s mother works long\
    \ hours, and Leila is the primary caregiver for her younger brother, adding stress\
    \ to her already heavy academic load. She seeks guidance on how to respond to\
    \ Alex, document the harassment, and protect herself while maintaining her academic\
    \ goals."
  description: "Leila is 5'6\" tall, dark hair, wears glasses, calm demeanor, anxious\
    \ but resilient. She often dresses in comfortable jeans and a hoodie, and carries\
    \ a laptop bag filled with notebooks and a water bottle. Mentally, she is detail\u2011\
    oriented, methodical, and highly empathetic, but she experiences bouts of anxiety\
    \ when confronted with conflict or uncertainty."
  personality: "Leila is thoughtful, empathetic, cautious, detail\u2011oriented, and\
    \ possesses a strong sense of justice. She tends to weigh options carefully before\
    \ speaking, often seeking advice from trusted mentors. She values honesty and\
    \ integrity, and is motivated by a desire to create inclusive spaces for herself\
    \ and others. While she can be reserved in new social settings, she is supportive\
    \ and encouraging to peers who face similar challenges."
  scenario: Leila is seeking help from an AI assistant after receiving harassing messages
    from teammate Alex, wanting advice on how to respond, document the harassment,
    and protect herself academically while maintaining her project responsibilities.
  summary: Empathetic student navigating teammate harassment, seeking support and
    guidance effectively.

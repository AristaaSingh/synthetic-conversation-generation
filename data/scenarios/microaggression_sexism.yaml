title: Workplace microaggression — co-presentation

description: >
  Two colleagues are coordinating over text for a joint project presentation
  next week. The conversation begins as a practical work exchange but gradually
  reveals gender-based assumptions about roles and competence.

relationship: >
  Colleagues at the same tech company. They work on the same team and have
  collaborated before. They are friendly and have an informal texting rapport.
  Neither thinks of the relationship as anything other than collegial.

vawg_category: STEREOTYPING-DOMINANCE, IDEOLOGICAL-INEQUALITY

character_a_context: >
  You are coordinating on the presentation and want to make sure the technical
  work is divided fairly. You value the collaboration but have a nagging sense
  that your technical contributions are sometimes not taken as seriously as
  your people skills. You do not initially name this feeling.

character_b_context: >
  You are coordinating on the presentation. You naturally assume you will handle
  the technical architecture decisions and your colleague will handle the
  client-facing and communication side — this feels obvious to you, not like
  a decision you're making.

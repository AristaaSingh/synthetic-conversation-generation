title: Workplace microaggression — ongoing colleague relationship

description: >
  Two colleagues at the same tech company who text regularly about work and
  occasionally personal topics. The conversation spans weeks and covers whatever
  naturally arises in their working lives — projects, meetings, team dynamics,
  day-to-day frustrations. There is no single event driving the conversation.

relationship: >
  Colleagues on the same team who have worked together for over a year. They are
  friendly and have an informal texting rapport. Neither thinks of the relationship
  as anything other than collegial.

vawg_category: STEREOTYPING-DOMINANCE, IDEOLOGICAL-INEQUALITY

character_a_context: >
  You text James about whatever is going on at work or in your day. You value
  the friendship but carry a background unease about how your contributions are
  perceived professionally. You do not name this feeling directly.

character_b_context: >
  You text Priya as a colleague and friend. You are warm and well-meaning.
  Your assumptions about gender roles surface naturally across whatever topics
  come up — not in any one dramatic moment, but consistently, in small ways.
